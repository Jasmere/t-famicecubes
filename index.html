<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T Fam Purified Ice Cubes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    /* ❄️ BACKGROUND IMAGE */
    background: url("tfamBg.png") no-repeat center center fixed;
    background-size: cover;

    color: white;
}

/* DARK OVERLAY */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 40, 70, 0.65);
    z-index: -1;
}

/* SNOW EFFECT */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.1;
    animation: snow 20s linear infinite;
}

@keyframes snow {
    from { transform: translateY(-50px); }
    to { transform: translateY(50px); }
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 0 15px rgba(173, 216, 230, 0.8);
}

h1 {
    margin: 0;
    font-size: 22px;
    background: linear-gradient(#ffffff, #aee1ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    opacity: 0.8;
    font-size: 14px;
    margin-bottom: 15px;
}

/* ORDER BUTTON */
.order-btn {
    display: block;
    text-align: center;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    padding: 14px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
    margin: 15px 0;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.6);
    transition: 0.3s;
}

.order-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0, 200, 255, 1);
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    margin: 12px 0;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
}

a {
    color: #aee1ff;
    text-decoration: none;
}

iframe {
    width: 100%;
    height: 250px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>T FAM PURIFIED ICE CUBES</h1>

        </div>
        <img src="tfamLogo.png" class="logo">
    </div>

    <!-- 🔥 ORDER BUTTON -->
    <a href="https://m.me/TFamICE?text=Hi%20I%20want%20to%20order%20ice%20cubes%0AName:%0AAddress:%0AQuantity:" 
       target="_blank" class="order-btn">
        ❄️ Order Now on Messenger
    </a>

    <!-- CONTACT -->
    <div class="card">
        📞 <br>
        <a href="tel:09913493185">09913493185</a><br>
        <a href="tel:09171657367">09171657367</a><br>
        <a href="tel:09763922026">09763922026</a>
    </div>

    <!-- LOCATION -->
    <div class="card">
        📍 95 Jasmine St., San Isidro Village CSFP
    </div>

    <!-- FACEBOOK -->
    <div class="card">
        👍 <a href="https://www.facebook.com/TFamICE" target="_blank">

</html>
