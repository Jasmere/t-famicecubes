/* DARK OVERLAY (important for readability) */
body::after {

    top: 0;
    left: 0;

.container {

/* ❄️ LOGO WITH GLOW */

    border-radius: 12px;

    .order-btn {

    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.6);
    transition: 0.3s;
}

.order-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0, 200, 255, 1);
}
/* ❄️ ICE TEXT EFFECT */
h1 {
    margin: 0;
    font-size: 22px;
    background: linear-gradient(#ffffff, #aee1ff);

}

.sub {
    opacity: 0.8;
    margin-bottom: 20px;
    font-size: 14px;
}

/* ❄️ FROSTED GLASS CARDS */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    margin: 12px 0;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
    transition: transform 0.2s ease;
}

/* subtle hover effect */
.card:hover {
    transform: scale(1.02);
}

/* LINKS */
a {
    color: #aee1ff;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

/* MAP */
iframe {
    width: 100%;
    height: 250px;
    border: 0;
    border-radius: 10px;
    margin-top: 10px;
}

/* ❄️ ICE DIVIDER */
.divider {
    height: 2px;
    background: linear-gradient(to right, transparent, #aee1ff, transparent);
