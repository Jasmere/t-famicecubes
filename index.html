<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T Fam Purified Ice Cubes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a3d62, #3c6382);
    color: white;
    overflow-x: hidden;
}

/* ❄️ SNOW / ICE PARTICLES */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.1;
    animation: snow 20s linear infinite;
}
@keyframes snow {
    from { transform: translateY(-50px); }
    to { transform: translateY(50px); }
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* ❄️ LOGO WITH GLOW */
.logo {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(173, 216, 230, 0.8);
}

/* ❄️ ICE TEXT EFFECT */
h1 {
    margin: 0;
    font-size: 22px;
    background: linear-gradient(#ffffff, #aee1ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(173,216,230,0.5);
}

.sub {
    opacity: 0.8;
    margin-bottom: 20px;
    font-size: 14px;
}

/* ❄️ FROSTED GLASS CARDS */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    margin: 12px 0;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
    transition: transform 0.2s ease;
}

/* subtle hover effect */
.card:hover {
    transform: scale(1.02);
}

/* LINKS */
a {
    color: #aee1ff;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

/* MAP */
iframe {
    width: 100%;
    height: 250px;
    border: 0;
    border-radius: 10px;
    margin-top: 10px;
}

/* ❄️ ICE DIVIDER */
.divider {
    height: 2px;
    background: linear-gradient(to right, transparent, #aee1ff, transparent);
    margin: 15px 0;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>T FAM PURIFIED ICE CUBES</h1>
            <div class="sub">Owned by Ivan Salas & Juinette Salas</div>
        </div>
        <img src="your-logo.png" alt="Logo" class="logo">
    </div>

    <div class="divider"></div>

    <div class="card">
        📞 <br>
        <a href="tel:09913493185">09913493185</a><br>
        <a href="tel:09171657367">09171657367</a><br>
        <a href="tel:09763922026">09763922026</a>
    </div>

    <div class="card">
        📍 95 Jasmine St., San Isidro Village CSFP
    </div>

    <div class="card">
        👍 <a href="https://www.facebook.com/TFamICE" target="_blank">
        Visit our Facebook Page</a>
    </div>

    <div class="card">
        📧 <a href="mailto:tfam.icecubes@gmail.com">
        tfam.icecubes@gmail.com</a>
    </div>

    <div class="card">
        <b>Find us here:</b>
        <iframe src="https://www.google.com/maps?q=15.05494249174508,120.65846409647064&output=embed"></iframe>
    </div>

</div>

</body>
</html>
